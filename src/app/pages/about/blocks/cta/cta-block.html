<div class="flex flex-col lg:flex-row lg:items-center justify-between gap-6">
  <p class="font-header text-3xl lg:text-5xl text-primary leading-tight">@for (part of data().text | accent; track $index) {@if (part.accent) {<em class="text-highlight italic">{{ part.text }}</em>} @else {{{ part.text }}}}</p>
  <a routerLink="/contact" draggable="false" class="cv-button whitespace-nowrap self-start lg:self-auto">
    {{ 'about.cta_link_label' | translate }}
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="size-4" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 19.5 15-15m0 0H8.25m11.25 0v11.25" />
    </svg>
  </a>
</div>
