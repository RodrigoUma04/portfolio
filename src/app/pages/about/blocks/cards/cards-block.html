<p class="text-muted font-label text-xs uppercase tracking-widest pb-4 mb-6 border-b border-muted">{{ 'about.cards_label' | translate }}</p>
<div class="grid gap-6" [class]="gridCols()">
  @for (item of data().items; track $index) {
    <div>
      @if (item.tag) {
        <span class="block text-muted font-label text-xs uppercase tracking-widest mb-2">{{ item.tag }}</span>
      }
      <h3 class="font-header text-2xl text-primary mb-2">{{ item.title }}</h3>
      <p class="font-body text-base text-muted leading-relaxed">{{ item.body }}</p>
    </div>
  }
</div>
