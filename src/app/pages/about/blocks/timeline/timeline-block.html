<p class="text-muted font-label text-xs uppercase tracking-widest pb-4 mb-4 border-b border-muted">{{ 'about.timeline_label' | translate }}</p>
<div class="flex flex-col">
  @for (item of data().items; track $index; let isFirst = $first) {
    <div class="grid grid-cols-[90px_1fr] lg:grid-cols-[140px_1fr] gap-6 border-b border-grey" [class]="isFirst ? 'pb-4' : 'py-4'">
      <span class="font-label text-xs text-muted pt-1 leading-relaxed">{{ item.date }}</span>
      <div>
        <div class="flex items-start justify-between gap-4">
          <h3 class="font-header text-xl text-primary">{{ item.title }}</h3>
          @if (item.tag) {
            <span class="font-label text-xs text-highlight uppercase tracking-widest shrink-0 pt-1">{{ item.tag }}</span>
          }
        </div>
        @if (item.subtitle) {
          <p class="font-body text-base text-muted italic mt-0.5">{{ item.subtitle }}</p>
        }
        @if (item.body) {
          <p class="font-body text-base text-muted mt-2 leading-relaxed">{{ item.body }}</p>
        }
      </div>
    </div>
  }
</div>
