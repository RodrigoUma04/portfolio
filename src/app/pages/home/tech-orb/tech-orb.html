<div class="orb-container relative w-full max-w-[600px] aspect-square mx-auto"
     role="img"
     aria-label="Technology skills visualization">

  <div class="orb-ring absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 rounded-full border border-grey w-[36%] aspect-square" aria-hidden="true"></div>
  <div class="orb-ring absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 rounded-full border border-grey w-[68%] aspect-square" aria-hidden="true"></div>
  <div class="orb-ring absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 rounded-full border border-grey w-[96%] aspect-square" aria-hidden="true"></div>

  @for (item of innerRing(); track item.name) {
    <span
      class="icon-inner absolute left-1/2 top-1/2"
      [title]="item.name"
      aria-hidden="true">
      <span class="icon-bubble flex items-center justify-center bg-white rounded-full w-6 h-6 lg:w-8 lg:h-8 border border-grey/60 shadow-sm transition-transform duration-200 hover:scale-[1.05] cursor-default">
        <img [src]="item.svg_url" alt="" class="w-4 h-4 lg:w-5 lg:h-5" draggable="false">
      </span>
    </span>
  }

  @for (item of middleRing(); track item.name) {
    <span
      class="icon-middle absolute left-1/2 top-1/2"
      [title]="item.name"
      aria-hidden="true">
      <span class="icon-bubble flex items-center justify-center bg-white rounded-full w-6 h-6 lg:w-8 lg:h-8 border border-grey/60 shadow-sm transition-transform duration-200 hover:scale-[1.05] cursor-default">
        <img [src]="item.svg_url" alt="" class="w-4 h-4 lg:w-5 lg:h-5" draggable="false">
      </span>
    </span>
  }

  @for (item of outerRing(); track item.name) {
    <span
      class="icon-outer absolute left-1/2 top-1/2"
      [title]="item.name"
      aria-hidden="true">
      <span class="icon-bubble flex items-center justify-center bg-white rounded-full w-6 h-6 lg:w-8 lg:h-8 border border-grey/60 shadow-sm transition-transform duration-200 hover:scale-[1.05] cursor-default">
        <img [src]="item.svg_url" alt="" class="w-4 h-4 lg:w-5 lg:h-5" draggable="false">
      </span>
    </span>
  }

</div>
