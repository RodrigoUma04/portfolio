<div
  #overlay
  class="fixed inset-0 z-50 flex flex-col bg-paper lg:hidden"
  role="dialog"
  aria-modal="true"
  aria-label="Mobile navigation"
>
  <nav class="flex flex-col items-center justify-center flex-1 gap-10" aria-label="Mobile navigation links">
    @for (link of links; track link.route) {
      <a
        #navLink
        [routerLink]="link.route"
        routerLinkActive="mobile-nav-link--active"
        #rla="routerLinkActive"
        [routerLinkActiveOptions]="{ exact: link.exact }"
        [attr.aria-current]="rla.isActive ? 'page' : null"
        class="mobile-nav-link"
        (click)="onLinkClick()"
      >{{ link.label | translate }}</a>
    }
  </nav>

  <div class="flex flex-col items-center gap-4 pb-[5dvh]">
    <app-language-switcher [openUp]="true" />
    @if (siteSettings()?.availability_open) {
      <span class="flex items-center gap-2.5 text-base font-label text-muted select-none">
        <span class="relative flex items-center justify-center size-3">
          <span class="absolute inline-flex size-full rounded-full bg-highlight opacity-40 animate-ping [animation-duration:2s]"></span>
          <span class="relative inline-flex rounded-full size-2 bg-highlight"></span>
        </span>
        {{ siteSettings()?.availability_label }}
      </span>
    }
    <a [href]="siteSettings()?.cv ?? ''" download aria-label="Download CV as PDF" class="cv-button">
      CV
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="size-4" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 13.5 12 21m0 0-7.5-7.5M12 21V3" />
      </svg>
    </a>
  </div>
</div>
