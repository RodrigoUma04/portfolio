<div class="relative select-none">
  <button
    (click)="toggle($event)"
    class="flex items-center gap-1 font-label text-sm text-muted hover:text-primary transition-colors duration-150 cursor-pointer uppercase"
    [attr.aria-expanded]="open()"
    aria-haspopup="listbox"
  >
    <span class="sr-only">Language: </span>{{ languageService.currentLang() }}
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2.5"
      class="size-3 transition-transform duration-200"
      [class.rotate-180]="open()"
      aria-hidden="true"
    >
      <path stroke-linecap="round" stroke-linejoin="round" d="m19 9-7 7-7-7" />
    </svg>
  </button>

  @if (open()) {
    <ul
      role="listbox"
      aria-label="Language options"
      class="absolute right-0 top-full mt-2 bg-paper border border-grey rounded-lg overflow-hidden z-50 min-w-16"
    >
      @for (lang of languageService.langs; track lang) {
        <option [attr.aria-selected]="languageService.currentLang() === lang">
          <button
            (click)="select(lang, $event)"
            class="w-full px-4 py-2 font-label text-sm uppercase text-left transition-colors duration-150 cursor-pointer"
            [class.text-primary]="languageService.currentLang() === lang"
            [class.font-bold]="languageService.currentLang() === lang"
            [class.text-muted]="languageService.currentLang() !== lang"
            [class.hover:bg-hover]="languageService.currentLang() !== lang"
          >{{ lang }}</button>
        </option>
      }
    </ul>
  }
</div>
